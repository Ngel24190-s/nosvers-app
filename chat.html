<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#18180F">
<title>NosVers · Assistant</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F4EFE4;--cream:#FDFAF4;--dark:#18180F;
  --green:#3D6B20;--glight:#EEF4E8;--gmid:#5A8A32;
  --border:rgba(60,50,20,.1);--mid:#7A7060;
  --ubg-angel:#2D5018;--ubg-africa:#7A3A6A;
  --aibg:#FFFFFF;--sh:0 2px 16px rgba(0,0,0,.07);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);font-family:'DM Sans',sans-serif;color:var(--dark);overflow:hidden}
.app{display:flex;flex-direction:column;height:100dvh;max-width:640px;margin:0 auto;background:var(--cream)}

/* HEADER */
.hd{background:var(--dark);padding:14px 18px 12px;display:flex;align-items:center;gap:12px;flex-shrink:0;position:relative;overflow:hidden}
.hd::after{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 90% 50%,rgba(90,138,50,.18) 0%,transparent 65%);pointer-events:none}
.hd-av{width:38px;height:38px;background:var(--green);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;border:2px solid rgba(255,255,255,.12)}
.hd-name{font-family:'Playfair Display',serif;font-size:15px;color:#FDFAF4;line-height:1.2}
.hd-sub{font-size:10px;color:rgba(253,250,244,.38);margin-top:1px}
.hd-dot{margin-left:auto;display:flex;align-items:center;gap:5px;font-size:10px;color:#7AB648}
.hd-dot::before{content:'';width:6px;height:6px;background:#7AB648;border-radius:50%;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}

/* SELECTOR */
.sel{background:var(--dark);padding:0 18px 12px;display:flex;gap:8px}
.sel-btn{flex:1;padding:8px 0;border-radius:8px;border:1px solid rgba(255,255,255,.1);background:transparent;color:rgba(253,250,244,.35);font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;transition:all .2s}
.sel-btn.on{border-color:transparent;color:#FDFAF4;font-weight:500}
#btn-angel.on{background:var(--ubg-angel)}
#btn-africa.on{background:var(--ubg-africa)}

/* SUGERENCIAS */
.sugs{padding:10px 14px 0;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;flex-shrink:0}
.sugs::-webkit-scrollbar{display:none}
.sug{white-space:nowrap;padding:6px 13px;border-radius:20px;border:1px solid var(--border);background:white;font-size:12px;color:var(--mid);cursor:pointer;transition:all .15s;flex-shrink:0;font-family:'DM Sans',sans-serif}
.sug:active{background:var(--glight);border-color:var(--gmid);color:var(--green)}

/* WELCOME */
.welcome{text-align:center;padding:28px 20px 4px;flex-shrink:0}
.wl-logo{font-family:'Playfair Display',serif;font-size:20px;color:var(--green);margin-bottom:5px}
.wl-sub{font-size:12px;color:var(--mid);line-height:1.6}

/* MENSAJES */
.msgs{flex:1;overflow-y:auto;padding:14px 14px 6px;display:flex;flex-direction:column;gap:9px;scroll-behavior:smooth}
.msgs::-webkit-scrollbar{width:2px}
.msgs::-webkit-scrollbar-thumb{background:var(--border)}

.msg{display:flex;flex-direction:column;max-width:85%;animation:up .18s ease}
@keyframes up{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
.msg.u{align-self:flex-end;align-items:flex-end}
.msg.a{align-self:flex-start;align-items:flex-start}

.bub{padding:10px 14px;border-radius:18px;font-size:14px;line-height:1.65;word-break:break-word}
.msg.u .bub{color:#FDFAF4;border-bottom-right-radius:4px}
.msg.a .bub{background:var(--aibg);color:var(--dark);border-bottom-left-radius:4px;box-shadow:var(--sh)}
.msg.a .bub b{color:var(--green)}

/* Imagen en burbuja */
.msg-img{max-width:200px;max-height:200px;border-radius:12px;object-fit:cover;display:block}

/* Etiqueta de quién habla */
.msg-who{font-size:10px;color:var(--mid);margin-bottom:3px;padding:0 4px}
.ts{font-size:10px;color:rgba(122,112,96,.4);margin-top:3px;padding:0 4px}

/* TYPING */
.typing .bub{display:flex;gap:4px;align-items:center;padding:13px 16px;background:var(--aibg);box-shadow:var(--sh)}
.dot{width:6px;height:6px;background:var(--mid);border-radius:50%;animation:bo .85s infinite}
.dot:nth-child(2){animation-delay:.15s}.dot:nth-child(3){animation-delay:.3s}
@keyframes bo{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}

/* PREVIEW FOTO */
.preview-bar{display:none;padding:8px 14px;background:#F0EAD8;border-top:1px solid var(--border);align-items:center;gap:10px;flex-shrink:0}
.preview-bar.show{display:flex}
.preview-thumb{width:48px;height:48px;border-radius:8px;object-fit:cover}
.preview-name{font-size:12px;color:var(--mid);flex:1}
.preview-del{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:white;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:14px;color:var(--mid)}

/* INPUT */
.inp-area{padding:8px 12px 14px;background:var(--cream);border-top:1px solid var(--border);flex-shrink:0}
.inp-row{display:flex;gap:6px;align-items:flex-end;background:white;border-radius:22px;border:1.5px solid var(--border);padding:6px 6px 6px 12px;box-shadow:var(--sh);transition:border-color .2s}
.inp-row:focus-within{border-color:var(--gmid)}
.cam-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--glight);cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;color:var(--green);font-size:16px;transition:all .15s}
.cam-btn:active{transform:scale(.9)}
textarea{flex:1;border:none;outline:none;resize:none;font-family:'DM Sans',sans-serif;font-size:14px;color:var(--dark);background:transparent;line-height:1.5;max-height:110px;min-height:22px;padding:2px 0}
textarea::placeholder{color:rgba(122,112,96,.45)}
.send{width:36px;height:36px;background:var(--green);border:none;border-radius:50%;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s;color:white}
.send:active{transform:scale(.93)}
.send:disabled{background:var(--border);cursor:not-allowed;transform:none}

/* Input file oculto */
#file-input{display:none}
</style>
</head>
<body>
<div class="app">

<div class="hd">
  <div class="hd-av">🌿</div>
  <div style="flex:1">
    <div class="hd-name">NosVers · Assistant</div>
    <div class="hd-sub" id="hd-sub">Ferme Sol Vivant · Dordogne</div>
  </div>
  <div class="hd-dot">En ligne</div>
</div>

<div class="sel">
  <button class="sel-btn on" id="btn-angel" onclick="setUser('angel')">🔧 Angel</button>
  <button class="sel-btn" id="btn-africa" onclick="setUser('africa')">🌺 África</button>
</div>

<div class="sugs" id="sugs"></div>

<div class="welcome" id="welcome">
  <div class="wl-logo">Bonjour 🌱</div>
  <div class="wl-sub" id="wl-sub">Escribe tu pregunta.<br>Conozco toda la ferme.</div>
</div>

<div class="msgs" id="msgs"></div>

<!-- Preview foto seleccionada -->
<div class="preview-bar" id="preview-bar">
  <img class="preview-thumb" id="preview-thumb" src="" alt="">
  <span class="preview-name" id="preview-name">Foto lista</span>
  <button class="preview-del" onclick="clearPhoto()" title="Quitar">✕</button>
</div>

<div class="inp-area">
  <div class="inp-row">
    <button class="cam-btn" onclick="document.getElementById('file-input').click()" title="Foto/vídeo">📷</button>
    <input type="file" id="file-input" accept="image/*,video/*" capture="environment" onchange="onFileSelect(event)">
    <textarea id="inp" rows="1" placeholder="Escribe aquí..." 
      onkeydown="onKey(event)" oninput="resize(this)"></textarea>
    <button class="send" id="sbtn" onclick="send()">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
      </svg>
    </button>
  </div>
</div>

</div>

<script>
// ── CONTEXTO COMPLETO NosVers ─────────────────────────────
const CTX_BASE = `Eres el asistente inteligente de NosVers, ferme lombricole familiale en Neuvic, Dordogne (24190), Francia.
Fundadores: Angel (CEO) y África (Directora de Conocimiento). SIRET registrado, MSA cotisant solidaire.

PRODUCTOS: Extrait Vivant 45€ · Service Frais 25€ · Engrais Vert 9,90€ · Atelier 85€
CLUB SOL VIVANT: 15€/mes · 20 plazas · PDF mensual + défi + Telegram + sorpresa física
FILOSOFÍA: Sol vivant · Soil Food Web Dr. Elaine Ingham · LombriThé 100-1000× microorganismos
WEB: nosvers.com · WordPress+WooCommerce · VPS Hostinger · GitHub: Ngel24190-s/nosvers-app
VISUAL (Nerea): #FEFAF4 + #5A7A2E · Playfair Display + DM Sans · editorial organique`;

const CTX_ANGEL = CTX_BASE + `

ROL: Eres el Director Ejecutivo digital de Angel. Él es el CEO.
IDIOMA: siempre español. Tono directo, concreto, sin rodeos.
Angel trabaja en desamiantage (DI ENVIRONNEMENT Sud Ouest) L-V — tiempo escaso.
Cuando pida algo técnico → da el comando exacto o el código funcional.
Conoces el sistema completo: VPS 72.61.160.108, GitHub, WordPress API, agentes cron.
Si pide publicar algo → prepara borrador, Angel aprueba.
AGENTES EN VPS: orchestrator(cada hora), agt01_visual, agt02_instagram(dom 10h), agt04_seo(lun 7h), agt05_africa(cada 6h), agt06_infoproduct.

SI HAY UNA IMAGEN: analízala en contexto de la ferme. Si son vers → estado del lombricultivo. Si es jardín → observación agronómica. Si es candidata para Instagram → dilo y sugiere el caption.`;

const CTX_AFRICA = CTX_BASE + `

ROL: Eres la asistente personal de África para la ferme.
IDIOMA: siempre français. Tono chaleureux, proche, comme une collègue de confiance.
África gère la ferme au quotidien — elle connaît le sol, les vers, les plantes.
Aide-la avec: observations du jardin, registres lombricultivo, contenu Club Sol Vivant, questions sur le sol.
Si elle décrit quelque chose → aide à l'interpréter et à le documenter.
Pour le Club → aide à structurer son savoir en PDF.
Jamais de jargon technique IT.

SI ELLE ENVOIE UNE PHOTO: analyse attentivement.
- Photo de vers → état de santé, densité estimée, conseils
- Photo de compost → couleur, texture, humidité, stade de décomposition
- Photo de plante/jardin → diagnostic, observations agronomiques
- Photo belle pour Instagram → dis-le et propose une caption en français
Réponds toujours de façon pratique et encourageante.`;

// ── SUGERENCIAS ───────────────────────────────────────────
const SUGS = {
  angel: ["¿Qué hay pendiente?","Estado agentes VPS","Genera posts Instagram","Redacta artículo blog","¿Cómo va el Club?"],
  africa: ["Comment vont les vers ?","Analyser cette photo 📷","Aide-moi pour un PDF","Recette de LombriThé","Que planter ce mois ?"]
};

// ── ESTADO ────────────────────────────────────────────────
let user = 'angel';
let hist = [];
let busy = false;
let pendingPhoto = null; // {base64, type, name}

// ── USUARIO ───────────────────────────────────────────────
function setUser(u) {
  user = u; hist = []; clearPhoto();
  document.getElementById('btn-angel').className = 'sel-btn' + (u==='angel'?' on':'');
  document.getElementById('btn-africa').className = 'sel-btn' + (u==='africa'?' on':'');
  document.getElementById('msgs').innerHTML = '';
  document.getElementById('welcome').style.display = '';
  document.getElementById('hd-sub').textContent = u === 'angel' ? 'Director Ejecutivo · Angel' : 'Assistante · África';
  document.getElementById('wl-sub').innerHTML = u === 'angel'
    ? 'Escribe tu pregunta o sube una foto.<br>Conozco toda la ferme.'
    : 'Pose ta question ou envoie une photo.<br>Je connais toute la ferme.';
  document.getElementById('inp').placeholder = u === 'angel' ? 'Escribe aquí...' : 'Écris ici...';
  renderSugs();
}

function renderSugs() {
  document.getElementById('sugs').innerHTML =
    SUGS[user].map(s => `<button class="sug" onclick="go('${s.replace(/'/g,"\\'")}',null)">${s}</button>`).join('');
}

// ── FOTO ──────────────────────────────────────────────────
function onFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) {
    alert(user === 'angel' ? 'Foto demasiado grande (máx 5MB)' : 'Photo trop grande (max 5MB)');
    return;
  }
  const reader = new FileReader();
  reader.onload = ev => {
    const dataUrl = ev.target.result;
    const base64 = dataUrl.split(',')[1];
    const type = file.type || 'image/jpeg';
    pendingPhoto = { base64, type, name: file.name };
    document.getElementById('preview-thumb').src = dataUrl;
    document.getElementById('preview-name').textContent = file.name;
    document.getElementById('preview-bar').classList.add('show');
    // Placeholder sugerido
    document.getElementById('inp').placeholder = user === 'angel'
      ? '¿Qué quieres saber de esta foto?'
      : 'Dis-moi ce que tu veux savoir de cette photo...';
  };
  reader.readAsDataURL(file);
  e.target.value = ''; // reset para poder subir la misma otra vez
}

function clearPhoto() {
  pendingPhoto = null;
  document.getElementById('preview-bar').classList.remove('show');
  document.getElementById('preview-thumb').src = '';
  document.getElementById('inp').placeholder = user === 'angel' ? 'Escribe aquí...' : 'Écris ici...';
}

// ── TIEMPO ────────────────────────────────────────────────
function now() {
  return new Date().toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});
}

// ── FORMATO MARKDOWN BÁSICO ───────────────────────────────
function fmt(t) {
  return t
    .replace(/\*\*(.*?)\*\*/g,'<b>$1</b>')
    .replace(/\*(.*?)\*/g,'<i>$1</i>')
    .replace(/^#{1,3} (.+)$/gm,'<b>$1</b>')
    .replace(/^[-•] (.+)$/gm,'• $1')
    .replace(/\n/g,'<br>');
}

// ── AÑADIR MENSAJE ────────────────────────────────────────
function addMsg(role, text, imgSrc, who) {
  document.getElementById('welcome').style.display = 'none';
  const c = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg ' + (role === 'user' ? 'u' : 'a');

  // Etiqueta de quién habla (solo en mensajes usuario)
  let whoLabel = '';
  if (role === 'user' && who) {
    whoLabel = `<div class="msg-who">${who === 'angel' ? '🔧 Angel' : '🌺 África'}</div>`;
  }

  // Color burbuja usuario según quién es
  const ubg = role === 'user'
    ? (user === 'angel' ? 'var(--ubg-angel)' : 'var(--ubg-africa)')
    : '';

  let bubContent = '';
  if (imgSrc) {
    bubContent += `<img class="msg-img" src="${imgSrc}" alt="foto">`;
    if (text) bubContent += `<br><span style="font-size:13px">${text}</span>`;
  } else {
    bubContent = role === 'user' ? text : fmt(text);
  }

  d.innerHTML = `
    ${whoLabel}
    <div class="bub" style="${ubg ? 'background:'+ubg : ''}">${bubContent}</div>
    <div class="ts">${now()}</div>
  `;
  c.appendChild(d);
  c.scrollTop = c.scrollHeight;
}

function showTyping() {
  document.getElementById('welcome').style.display = 'none';
  const c = document.getElementById('msgs');
  const d = document.createElement('div');
  d.className = 'msg a typing'; d.id = 'ty';
  d.innerHTML = '<div class="bub"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  c.appendChild(d); c.scrollTop = c.scrollHeight;
}
function hideTyping() { const t = document.getElementById('ty'); if(t) t.remove(); }

// ── ENVIAR ────────────────────────────────────────────────
async function send() {
  const inp = document.getElementById('inp');
  const txt = inp.value.trim();
  const photo = pendingPhoto;

  if (!txt && !photo) return;
  if (busy) return;

  inp.value = ''; resize(inp);
  clearPhoto();
  await go(txt, photo);
}

async function go(txt, photo) {
  if (busy) return;
  busy = true;
  document.getElementById('sbtn').disabled = true;

  // Mostrar mensaje del usuario
  const displayText = txt || (user === 'angel' ? '(foto adjunta)' : '(photo jointe)');
  addMsg('user', displayText, photo ? `data:${photo.type};base64,${photo.base64}` : null, user);

  showTyping();

  try {
    // Construir payload
    const payload = {
      system: user === 'angel' ? CTX_ANGEL : CTX_AFRICA,
      user: txt || (user === 'angel' ? 'Analiza esta imagen en el contexto de la ferme NosVers.' : 'Analyse cette image dans le contexte de la ferme NosVers.'),
      messages: hist.slice(-10)
    };

    // Si hay foto, añadir como contenido con imagen
    if (photo && photo.type.startsWith('image/')) {
      payload.user_content = [
        { type: 'image', source: { type: 'base64', media_type: photo.type, data: photo.base64 } },
        { type: 'text', text: payload.user }
      ];
    }

    // Añadir al historial antes de enviar
    hist.push({ role: 'user', content: payload.user });

    const res = await fetch('api.php?action=agente', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'X-App-Token': getToken()
      },
      body: JSON.stringify(payload)
    });

    hideTyping();
    if (!res.ok) throw new Error('HTTP ' + res.status);

    const data = await res.json();
    let reply = '';
    if (data.content && Array.isArray(data.content)) {
      reply = data.content.find(b => b.type === 'text')?.text || '';
    } else if (data.error) {
      reply = '⚠️ ' + data.error;
    }

    if (reply) {
      addMsg('ai', reply);
      hist.push({ role: 'assistant', content: reply });

      // Si la respuesta menciona guardar en vault, hacerlo automáticamente
      if (photo && reply.length > 50) {
        saveToVault(txt, reply, photo.type);
      }
    }

  } catch(e) {
    hideTyping();
    addMsg('ai', user === 'angel'
      ? `⚠️ Error de conexión: ${e.message}`
      : `⚠️ Erreur de connexion: ${e.message}`);
  }

  busy = false;
  document.getElementById('sbtn').disabled = false;
  document.getElementById('inp').focus();
}

// ── GUARDAR EN VAULT ──────────────────────────────────────
async function saveToVault(pregunta, respuesta, mediaType) {
  try {
    const categoria = user === 'africa' ? (mediaType.startsWith('image') ? 'vers' : 'huerto') : 'operaciones';
    const fecha = new Date().toISOString().split('T')[0];
    const contenido = `## ${fecha} — ${user === 'africa' ? 'Observación África' : 'Nota Angel'}\n\n**Consulta:** ${pregunta || '(imagen)'}\n\n**Análisis:** ${respuesta}`;

    await fetch('api.php?action=vault_write', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'X-App-Token': getToken() },
      body: JSON.stringify({ category: categoria, filename: 'observaciones', content: contenido, mode: 'append' })
    });
  } catch(e) {
    // silencioso — no bloquear el chat
  }
}

// ── TOKEN ─────────────────────────────────────────────────
function getToken() {
  const p = new URLSearchParams(location.search).get('token');
  if (p) { localStorage.setItem('nv_tok', p); history.replaceState({}, '', location.pathname); return p; }
  return localStorage.getItem('nv_tok') || '';
}

// ── HELPERS ───────────────────────────────────────────────
function onKey(e) { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); } }
function resize(el) { el.style.height = 'auto'; el.style.height = Math.min(el.scrollHeight, 110) + 'px'; }

// ── INIT ──────────────────────────────────────────────────
renderSugs();
</script>
</body>
</html>
